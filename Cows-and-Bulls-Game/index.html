<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cows & Bulls Game</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="./index.css">
</head>
<body class="align-items-center justify-content-center vh-100">
    <div class="container text-center p-5 rounded shadow-sm" style="background-color: #DFF2EB;">
        <h1 class="mb-4">Cows & Bulls Game</h1>
        <p>Guess the 4-digit number with unique digits!</p>
        <input type="text" id="guessInput" maxlength="4" class="form-control mb-3 text-center" placeholder="1234">
        <button class="btn btn-primary me-2" onclick="submitGuess()">Submit Guess</button>
        <button class="btn btn-secondary" onclick="resetGame()">New Game</button>
        <div id="targetNumberDisplay" class="mt-3 text-muted">Generated Number: </div>
        <div class="feedback mt-3" id="feedback"></div>
        <div class="error mt-2 text-danger" id="error"></div>
        <div id="guessLog" class="mt-4">
            <ul class="list-group" id="guessList"></ul>
        </div>
    </div>
    <script src="./index.js"></script>
</body>
</html>
